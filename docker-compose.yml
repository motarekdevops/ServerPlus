services:
  serverplus:
    build: .
    container_name: serverplus
    ports:
      - "8000:8000"
    volumes:
      - ./database:/var/www/html/database
      - ./.env:/var/www/html/.env
    environment:
      - APP_ENV=local
      - DB_CONNECTION=sqlite
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true
